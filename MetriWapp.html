<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetriWapp Intelligence — Intelligence Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f1f5f9; --sidebar-bg: #0f172a; --card-bg: #ffffff;
            --border: #e2e8f0; --text-main: #1e293b; --text-muted: #64748b;
            --accent: #2563eb; --success: #10b981; --warning: #f59e0b;
            --danger: #ef4444; --watiket: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-main); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar mejorado */
        .sidebar { width: 340px; background: var(--sidebar-bg); color: white; display: flex; flex-direction: column; padding: 20px; overflow-y: auto; flex-shrink: 0; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 25px; border-bottom: 1px solid #1e293b; padding-bottom: 15px; }
        .logo span { color: var(--accent); }

        .form-section { background: #1e293b; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #334155; }
        .form-section h3 { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 4px; font-weight: 700; }
        .form-group input, .form-group select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 4px; padding: 8px 10px; color: white; font-family: inherit; font-size: 13px; }

        .btn-main { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.2s; margin-top: 10px; }
        .btn-main:hover { filter: brightness(1.1); transform: translateY(-1px); }

        /* Contenido */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #fff; border-bottom: 1px solid var(--border); padding: 12px 25px; display: flex; align-items: center; justify-content: space-between; }
        
        .tab-btn { padding: 10px 20px; border-radius: 6px; border: none; background: transparent; cursor: pointer; font-weight: 700; color: var(--text-muted); transition: 0.2s; }
        .tab-btn.active { background: #eff6ff; color: var(--accent); }

        .view-container { flex: 1; padding: 25px; overflow-y: auto; }
        
        /* Stats y Ranking */
        .header-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid var(--border); }
        .stat-card small { font-size: 10px; font-weight: 800; text-transform: uppercase; color: var(--text-muted); }
        .stat-card .val { font-size: 26px; font-weight: 800; margin-top: 4px; }

        .rank-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .rank-card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 15px; }

        /* Tarjetas */
        .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 15px; }
        .phone-card { background: white; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .phone-card.is-down { border-color: var(--danger); }
        
        .card-inner { padding: 15px; }
        .card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-vitals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .vital-box { background: #f8fafc; padding: 10px; border-radius: 8px; border: 1px solid #f1f5f9; }
        .vital-label { font-size: 9px; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 2px; }
        .vital-val { font-size: 16px; font-weight: 800; color: var(--text-main); }

        .silence-alert { background: #fff1f2; color: var(--danger); padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 700; text-align: center; border: 1px solid #fee2e2; margin-top: 10px; }

        /* Statuses */
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .s-alto { background: var(--success); } .s-medio { background: var(--warning); } .s-bajo { background: var(--text-muted); } .s-down { background: var(--danger); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Análisis View */
        .log-row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding: 10px; font-size: 12px; }
        .badge { font-size: 10px; padding: 3px 8px; border-radius: 99px; font-weight: 800; text-transform: uppercase; }
        .b-accent { background: #eff6ff; color: var(--accent); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">Intelligence<span>Report</span></div>

        <!-- SECCIÓN CARGA DE DATA REAL -->
        <div class="form-section">
            <h3>◈ Entrada de Métricas</h3>
            <div class="form-group">
                <label>Nombre Celular</label>
                <input type="text" id="fName" placeholder="Princi 1">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div class="form-group">
                    <label>4 Dígitos</label>
                    <input type="text" id="fDigits" placeholder="0000">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="fType">
                        <option value="principal">🎯 Principal</option>
                        <option value="soporte">🛟 Soporte</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Vistas Actuales (Status)</label>
                <input type="number" id="fViews">
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
                <div class="form-group">
                    <label>Hora Subida</label>
                    <input type="time" id="fTime">
                </div>
                <div class="form-group">
                    <label>Hora Último Msg</label>
                    <input type="time" id="fLastMsg">
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>◈ Control de Operación</h3>
            <div class="form-group">
                <label>Nivel de Flujo Percibido</label>
                <select id="fFlow">
                    <option value="alto">Alto (Tráfico Intenso)</option>
                    <option value="medio">Medio (Estable)</option>
                    <option value="bajo">Bajo (Lento)</option>
                </select>
            </div>
            <div class="form-group" style="display:flex; gap:10px;">
                <input type="checkbox" id="fWk" checked style="width:20px;">
                <label for="fWk" style="margin:0">Activo en Watiket</label>
            </div>
        </div>

        <button class="btn-main" id="btnSubmit" onclick="submitMetric()">Actualizar Datos</button>
        
        <div style="margin-top:auto; padding-top:20px;">
            <button class="btn-main" onclick="exportFullData()" style="background:#475569">↓ Exportar Datos Crudos</button>
            <button class="btn-main" onclick="clearSystem()" style="background:transparent; color:var(--danger); border:1px solid #ef444433; margin-top:5px; font-size:11px;">⚠️ RESET SISTEMA</button>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div class="tab-btns">
                <button class="tab-btn active" id="tabLiveBtn" onclick="toggleView('live')">Real-Time Monitor</button>
                <button class="tab-btn" id="tabStatsBtn" onclick="toggleView('stats')">Data Deep-Analysis</button>
            </div>
            <div id="clockDisplay" style="font-family:'JetBrains Mono'; font-weight:800; font-size:16px;">00:00:00</div>
        </div>

        <div class="view-container" id="vLive">
            <!-- KPIs SUPERIOR -->
            <div class="header-stats">
                <div class="stat-card" style="border-left:5px solid var(--accent)">
                    <small>Celulares Operando</small>
                    <div class="val" id="statActiveCount">0</div>
                </div>
                <div class="stat-card" style="border-left:5px solid var(--danger)">
                    <small>Downtime (Caídos)</small>
                    <div class="val" id="statDownCount">0</div>
                </div>
                <div class="stat-card" style="border-left:5px solid var(--watiket)">
                    <small>Total Watiket</small>
                    <div class="val" id="statWkCount">0</div>
                </div>
                <div class="stat-card" style="border-left:5px solid var(--success)">
                    <small>Avg Global VPH</small>
                    <div class="val" id="statAvgVph">0</div>
                </div>
            </div>

            <!-- RANKING DE RENDIMIENTO -->
            <div class="rank-grid">
                <div class="rank-card">
                    <h4 style="margin-bottom:12px; font-size:13px; color:var(--text-muted)">🚀 LÍDERES DE FLUJO (TOP VPH)</h4>
                    <div id="topPerformanceList"></div>
                </div>
                <div class="rank-card">
                    <h4 style="margin-bottom:12px; font-size:13px; color:var(--text-muted)">⚠️ ALERTAS DE INACTIVIDAD</h4>
                    <div id="silentAlertList"></div>
                </div>
            </div>

            <!-- CARDS -->
            <div class="cards-grid" id="mainMonitorGrid"></div>
        </div>

        <div class="view-container" id="vStats" style="display:none;">
            <div class="rank-card">
                <h3 style="margin-bottom:20px;">📋 LOG COMPLETO DE INCIDENCIAS</h3>
                <div id="historyLogsTable"></div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'metriwapp_v4';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || {};

        function sync() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
            renderAll();
        }

        // Clock
        setInterval(() => {
            document.getElementById('clockDisplay').textContent = new Date().toLocaleTimeString('es-AR');
            // Re-renderizar solo cada 1 minuto para refrescar las alertas de silencio si querés, pero mejor renderizar tras cambios.
        }, 1000);

        function submitMetric() {
            const name = document.getElementById('fName').value.trim();
            const digs = document.getElementById('fDigits').value.trim();
            const views = parseInt(document.getElementById('fViews').value) || 0;
            const upTime = document.getElementById('fTime').value;
            const lastMsg = document.getElementById('fLastMsg').value;

            if(!name || !digs || !upTime) return alert("Faltan campos (Nombre, Dígitos y Hora Status)");

            const id = 'p' + (Object.keys(db).find(k => db[k].digits === digs) ? Object.keys(db).find(k => db[k].digits === digs).slice(1) : Date.now());

            db[id] = {
                ...db[id],
                id, name, digits: digs,
                type: document.getElementById('fType').value,
                flowManual: document.getElementById('fFlow').value,
                views, 
                upTime, 
                lastMsgTime: lastMsg || upTime,
                lastUpdate: new Date().toISOString(),
                inWatiket: document.getElementById('fWk').checked,
                vph: calculateVph(views, upTime),
                isDown: db[id]?.isDown || false,
                incidentHistory: db[id]?.incidentHistory || []
            };

            sync();
            alert(`✅ ${name} Actualizado`);
        }

        function calculateVph(v, t) {
            const [h, m] = t.split(':').map(Number);
            const now = new Date();
            const upload = new Date(); upload.setHours(h, m, 0, 0);
            if (upload > now) upload.setDate(upload.getDate() - 1);
            const hours = (now - upload) / (1000 * 60 * 60);
            return hours < 0.2 ? v : Math.round(v / hours);
        }

        function toggleView(v) {
            document.getElementById('vLive').style.display = v === 'live' ? 'block' : 'none';
            document.getElementById('vStats').style.display = v === 'stats' ? 'block' : 'none';
            document.getElementById('tabLiveBtn').className = v === 'live' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabStatsBtn').className = v === 'stats' ? 'tab-btn active' : 'tab-btn';
        }

        function markDown(id) {
            db[id].isDown = true;
            db[id].downAt = new Date().toISOString();
            sync();
        }

        function markUp(id) {
            const msgs = prompt("¿Cuántos mensajes acumulados recibió durante la caída?");
            if (msgs === null) return;
            const p = db[id];
            p.incidentHistory.unshift({
                start: p.downAt,
                end: new Date().toISOString(),
                totalMsgs: msgs
            });
            p.isDown = false; p.downAt = null;
            sync();
        }

        function renderAll() {
            const grid = document.getElementById('mainMonitorGrid');
            const performanceList = document.getElementById('topPerformanceList');
            const silentList = document.getElementById('silentAlertList');
            grid.innerHTML = ""; performanceList.innerHTML = ""; silentList.innerHTML = "";

            let countAct = 0, countDown = 0, countWk = 0, vphSum = 0;
            const sortedByVph = Object.values(db).sort((a,b) => b.vph - a.vph);
            
            Object.values(db).forEach(p => {
                if(p.isDown) countDown++; else { countAct++; vphSum += p.vph; }
                if(p.inWatiket) countWk++;

                // Lógica de alerta de silencio
                let silenceAlert = "";
                if(!p.isDown && p.lastMsgTime) {
                    const [h, m] = p.lastMsgTime.split(':').map(Number);
                    const lastDate = new Date(); lastDate.setHours(h, m, 0, 0);
                    const diffMins = Math.round((new Date() - lastDate) / (1000 * 60));
                    if(diffMins > 45) silenceAlert = `<div class="silence-alert">SILENCIO: Hace ${diffMins} min sin actividad</div>`;
                }

                grid.innerHTML += `
                    <div class="phone-card ${p.isDown ? 'is-down' : ''}">
                        <div class="card-inner">
                            <div class="card-head">
                                <div>
                                    <span class="dot ${p.isDown ? 's-down' : 's-'+p.flowManual}"></span>
                                    <b>${p.name}</b>
                                    <small style="display:block; font-family:monospace; color:var(--text-muted)">DIG: ${p.digits}</small>
                                </div>
                                <div style="text-align:right">
                                    <span class="badge b-accent">${p.type}</span>
                                    ${p.inWatiket ? '<span class="badge" style="background:#ddd6fe; color:#5b21b6">Watiket</span>' : ''}
                                </div>
                            </div>
                            <div class="card-vitals">
                                <div class="vital-box">
                                    <div class="vital-label">Vistas/Hora</div>
                                    <div class="vital-val">${p.isDown ? '---' : p.vph}</div>
                                </div>
                                <div class="vital-box">
                                    <div class="vital-label">Total Vistas</div>
                                    <div class="vital-val">${p.views}</div>
                                </div>
                            </div>
                            <div style="font-size:11px; color:var(--text-muted); padding:0 5px;">
                                Subida: <b>${p.upTime}</b> | Flujo Percibido: <b style="text-transform:uppercase">${p.flowManual}</b>
                            </div>
                            ${silenceAlert}
                            <div style="display:flex; gap:8px; margin-top:15px;">
                                <button onclick="markDown('${p.id}')" style="flex:1; padding:6px; font-size:11px; background:none; border:1px solid var(--border); border-radius:4px; cursor:pointer">${p.isDown ? '⚠ CAÍDO' : 'MARCAR CAÍDA'}</button>
                                ${p.isDown ? `<button onclick="markUp('${p.id}')" style="flex:1; padding:6px; font-size:11px; background:var(--success); color:white; border:none; border-radius:4px; cursor:pointer">SUBIR (UP)</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            });

            // Ranking Performance
            sortedByVph.slice(0, 3).forEach((p, idx) => {
                performanceList.innerHTML += `<div class="log-row"><span>#${idx+1} <b>${p.name}</b></span> <span class="badge b-accent">${p.vph} v/h</span></div>`;
            });

            // Alertas de Inactividad en Ranking
            Object.values(db).forEach(p => {
                if(!p.isDown && p.lastMsgTime) {
                    const [h, m] = p.lastMsgTime.split(':').map(Number);
                    const lastDate = new Date(); lastDate.setHours(h, m, 0, 0);
                    const diffMins = Math.round((new Date() - lastDate) / (1000 * 60));
                    if(diffMins > 60) silentList.innerHTML += `<div class="log-row" style="color:var(--danger)"><span>⚠ ${p.name}</span> <span>Hace ${diffMins}m</span></div>`;
                }
            });

            // Deep-Stats (logs)
            const histList = document.getElementById('historyLogsTable');
            histList.innerHTML = "";
            Object.values(db).forEach(p => {
                p.incidentHistory.forEach(inc => {
                    const mins = Math.round((new Date(inc.end) - new Date(inc.start))/(1000*60));
                    histList.innerHTML += `
                        <div class="log-row">
                            <span><b>${p.name}</b> estuvo ${mins} min fuera de servicio</span>
                            <span>Reportó <b>${inc.totalMsgs} msgs</b> al subir</span>
                        </div>`;
                });
            });

            document.getElementById('statActiveCount').textContent = countAct;
            document.getElementById('statDownCount').textContent = countDown;
            document.getElementById('statWkCount').textContent = countWk;
            document.getElementById('statAvgVph').textContent = countAct ? Math.round(vphSum / countAct) : 0;
        }

        function exportFullData() {
            const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
            const dl = document.createElement('a'); dl.href = URL.createObjectURL(blob);
            dl.download = `informe_casino_${new Date().toLocaleDateString()}.json`; dl.click();
        }

        function clearSystem() { if(confirm("⚠ ESTO BORRARÁ TODA LA DATA Y MÉTRICAS DEL DÍA. ¿Estás seguro?")) { db = {}; sync(); } }

        renderAll();
    </script>
</body>
</html>
