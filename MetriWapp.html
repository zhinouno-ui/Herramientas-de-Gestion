<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetriWapp - Dashboard Casino Online</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e1a;
            color: #e5e7eb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 1800px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, #1e40af 0%, #3b82f6 100%);
            padding: 20px 25px;
            border-radius: 10px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.25);
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 13px;
        }

        /* RESUMEN SUPERIOR */
        .summary-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 12px;
            margin-bottom: 16px;
        }

        .summary-card {
            background: #1a1f2e;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #2d3748;
            text-align: center;
        }

        .summary-value {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .summary-value.green { color: #10b981; }
        .summary-value.red { color: #ef4444; }
        .summary-value.blue { color: #3b82f6; }
        .summary-value.yellow { color: #f59e0b; }

        .summary-label {
            font-size: 11px;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* FORMULARIO */
        .controls {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #2d3748;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            margin-bottom: 14px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 11px;
            font-weight: 600;
            color: #9ca3af;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        input, select {
            background: #0a0e1a;
            border: 1.5px solid #374151;
            color: #e5e7eb;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 20px;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            text-transform: none;
        }

        .btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            margin-left: 8px;
        }

        /* DASHBOARD */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 14px;
            margin-bottom: 16px;
        }

        .phone-card {
            background: #1a1f2e;
            border-radius: 10px;
            padding: 16px;
            border: 2px solid #2d3748;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .phone-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--status-color);
        }

        .phone-card.active { --status-color: #10b981; border-color: rgba(16, 185, 129, 0.3); }
        .phone-card.moderate { --status-color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
        .phone-card.inactive { --status-color: #ef4444; border-color: rgba(239, 68, 68, 0.3); }
        .phone-card.soporte { --status-color: #6b7280; border-color: rgba(107, 114, 128, 0.3); }

        .phone-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 8px;
        }

        .phone-info {
            flex: 1;
        }

        .phone-name {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 3px;
        }

        .phone-digits {
            font-size: 12px;
            color: #9ca3af;
            font-family: 'Courier New', monospace;
        }

        .badges {
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: flex-end;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .badge.principal {
            background: rgba(59, 130, 246, 0.2);
            color: #3b82f6;
        }

        .badge.soporte {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .badge.watiket {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge.no-watiket {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-top: 4px;
        }

        .status-badge.active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.moderate {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-badge.inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-badge.soporte-status {
            background: rgba(107, 114, 128, 0.2);
            color: #9ca3af;
        }

        .metrics-compact {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }

        .metric-compact {
            background: #0a0e1a;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #374151;
        }

        .metric-compact-label {
            font-size: 10px;
            color: #9ca3af;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        .metric-compact-value {
            font-size: 20px;
            font-weight: 700;
        }

        .metric-unit {
            font-size: 11px;
            color: #6b7280;
            margin-left: 3px;
        }

        .flow-bar {
            height: 6px;
            background: #374151;
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .flow-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--status-color), var(--status-color));
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .down-info {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 10px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 12px;
        }

        .down-info-title {
            font-weight: 600;
            color: #ef4444;
            margin-bottom: 4px;
        }

        .down-stat {
            color: #9ca3af;
            font-size: 11px;
        }

        .actions {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 7px 10px;
            font-size: 11px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-down {
            background: #ef4444;
            color: white;
        }

        .btn-up {
            background: #10b981;
            color: white;
        }

        .btn-delete {
            background: #6b7280;
            color: white;
            flex: 0;
            padding: 7px 12px;
        }

        .btn-small:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        /* RANKING */
        .ranking-section {
            background: #1a1f2e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #2d3748;
        }

        .ranking-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .ranking-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 10px;
        }

        .ranking-item {
            background: #0a0e1a;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #374151;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-number {
            font-size: 22px;
            font-weight: 700;
            color: #6b7280;
            min-width: 35px;
            text-align: center;
        }

        .rank-number.gold { color: #fbbf24; }
        .rank-number.silver { color: #9ca3af; }
        .rank-number.bronze { color: #f97316; }

        .rank-info {
            flex: 1;
        }

        .rank-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .rank-stat {
            font-size: 12px;
            color: #9ca3af;
        }

        .rank-watiket {
            font-size: 10px;
            color: #10b981;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 12px;
            padding: 24px;
            max-width: 450px;
            width: 100%;
            border: 2px solid #2d3748;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .btn-cancel {
            background: #6b7280;
            flex: 1;
        }

        .btn-confirm {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            flex: 1;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #6b7280;
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .summary-bar {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        @media print {
            body {
                background: white;
                color: black;
            }
            
            .controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📱 MetriWapp Dashboard</h1>
            <div class="subtitle">Sistema de Monitoreo - Casino Online</div>
        </header>

        <!-- RESUMEN SUPERIOR -->
        <div class="summary-bar">
            <div class="summary-card">
                <div class="summary-value green" id="summaryActive">0</div>
                <div class="summary-label">Principales Activos</div>
            </div>
            <div class="summary-card">
                <div class="summary-value red" id="summaryDown">0</div>
                <div class="summary-label">Principales Caídos</div>
            </div>
            <div class="summary-card">
                <div class="summary-value blue" id="summaryWatiket">0</div>
                <div class="summary-label">En Watiket</div>
            </div>
            <div class="summary-card">
                <div class="summary-value yellow" id="summarySoporte">0</div>
                <div class="summary-label">Soportes</div>
            </div>
        </div>

        <!-- FORMULARIO -->
        <div class="controls">
            <div class="form-grid">
                <div class="form-group">
                    <label>Nombre del Celular</label>
                    <input type="text" id="phoneName" placeholder="Ej: Princi 1">
                </div>
                <div class="form-group">
                    <label>Últimos 4 Dígitos</label>
                    <input type="text" id="phoneDigits" placeholder="Ej: 5831" maxlength="4">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="phoneType">
                        <option value="principal">Principal</option>
                        <option value="soporte">Soporte</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Vistas del Estado</label>
                    <input type="number" id="views" placeholder="Ej: 1400">
                </div>
                <div class="form-group">
                    <label>Hora Subida Estado</label>
                    <input type="time" id="uploadTime">
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="inWatiket" checked>
                    <label for="inWatiket">En Watiket</label>
                </div>
            </div>
            <button class="btn" onclick="addMetric()">+ Cargar Métrica</button>
            <button class="btn btn-secondary" onclick="exportData()">📊 Exportar Datos</button>
            <button class="btn btn-secondary" onclick="clearAllData()">🗑️ Limpiar Todo</button>
        </div>

        <!-- DASHBOARD DE CELULARES -->
        <div class="dashboard" id="dashboard">
            <div class="empty-state">
                <div class="empty-state-icon">📱</div>
                <h3>No hay celulares registrados</h3>
                <p>Comienza agregando métricas</p>
            </div>
        </div>

        <!-- RANKING -->
        <div class="ranking-section" id="rankingSection" style="display: none;">
            <div class="ranking-title">🏆 Ranking por Flujo (Vistas/Hora)</div>
            <div class="ranking-grid" id="rankingList"></div>
        </div>
    </div>

    <!-- MODAL LEVANTAR CELULAR -->
    <div class="modal" id="liftModal">
        <div class="modal-content">
            <div class="modal-title">🔺 Levantar Celular</div>
            <div class="modal-form">
                <div class="form-group">
                    <label>Mensajes Acumulados (Obligatorio)</label>
                    <input type="number" id="accumulatedMessages" placeholder="Ej: 200">
                </div>
                <div class="form-group">
                    <label>Hora Primer Mensaje (Opcional)</label>
                    <input type="time" id="firstMessageTime">
                </div>
                <div class="form-group">
                    <label>Hora Último Mensaje (Opcional)</label>
                    <input type="time" id="lastMessageTime">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeLiftModal()">Cancelar</button>
                <button class="btn btn-confirm" onclick="confirmLift()">Confirmar</button>
            </div>
        </div>
    </div>

    <script>
        let phones = {};
        let currentLiftingPhone = null;

        // Cargar datos del localStorage
        function loadData() {
            const saved = localStorage.getItem('metriwapp_dashboard_v2');
            if (saved) {
                phones = JSON.parse(saved);
                renderAll();
            }
        }

        // Guardar datos en localStorage
        function saveData() {
            localStorage.setItem('metriwapp_dashboard_v2', JSON.stringify(phones));
        }

        function addMetric() {
            const name = document.getElementById('phoneName').value.trim();
            const digits = document.getElementById('phoneDigits').value.trim();
            const type = document.getElementById('phoneType').value;
            const views = parseInt(document.getElementById('views').value);
            const uploadTime = document.getElementById('uploadTime').value;
            const inWatiket = document.getElementById('inWatiket').checked;

            if (!name || !digits || !views || !uploadTime) {
                alert('Por favor completa: Nombre, Dígitos, Vistas y Hora');
                return;
            }

            const phoneKey = `${name}_${digits}`;
            const now = new Date();
            const uploadDate = new Date();
            const [hours, minutes] = uploadTime.split(':');
            uploadDate.setHours(hours, minutes, 0, 0);

            if (!phones[phoneKey]) {
                phones[phoneKey] = {
                    name: name,
                    digits: digits,
                    type: type,
                    inWatiket: inWatiket,
                    metrics: [],
                    downtime: [],
                    currentlyDown: false,
                    downSince: null
                };
            }

            // Actualizar configuración
            phones[phoneKey].type = type;
            phones[phoneKey].inWatiket = inWatiket;

            const viewsPerHour = calculateViewsPerHour(views, uploadDate, now);

            phones[phoneKey].metrics.push({
                views: views,
                uploadTime: uploadDate.toISOString(),
                recordedAt: now.toISOString(),
                viewsPerHour: viewsPerHour
            });

            // Mantener últimas 20 métricas
            if (phones[phoneKey].metrics.length > 20) {
                phones[phoneKey].metrics = phones[phoneKey].metrics.slice(-20);
            }

            saveData();
            renderAll();

            // Limpiar formulario
            document.getElementById('views').value = '';
            document.getElementById('phoneName').focus();
        }

        function calculateViewsPerHour(views, uploadTime, recordedTime) {
            const hoursDiff = (recordedTime - new Date(uploadTime)) / (1000 * 60 * 60);
            if (hoursDiff < 0.1) return Math.round(views * 10);
            return Math.round(views / hoursDiff);
        }

        function getPhoneStatus(phone) {
            if (phone.currentlyDown) return 'inactive';
            if (phone.type === 'soporte') return 'soporte-status';
            if (!phone.metrics || phone.metrics.length === 0) return 'inactive';
            
            const latest = phone.metrics[phone.metrics.length - 1];
            const viewsPerHour = latest.viewsPerHour;

            if (viewsPerHour >= 80) return 'active';
            if (viewsPerHour >= 30) return 'moderate';
            return 'inactive';
        }

        function markPhoneDown(phoneKey) {
            phones[phoneKey].currentlyDown = true;
            phones[phoneKey].downSince = new Date().toISOString();
            saveData();
            renderAll();
        }

        function openLiftModal(phoneKey) {
            currentLiftingPhone = phoneKey;
            document.getElementById('liftModal').classList.add('active');
            document.getElementById('accumulatedMessages').focus();
        }

        function closeLiftModal() {
            currentLiftingPhone = null;
            document.getElementById('liftModal').classList.remove('active');
            document.getElementById('accumulatedMessages').value = '';
            document.getElementById('firstMessageTime').value = '';
            document.getElementById('lastMessageTime').value = '';
        }

        function confirmLift() {
            const messages = parseInt(document.getElementById('accumulatedMessages').value);
            const firstMsg = document.getElementById('firstMessageTime').value;
            const lastMsg = document.getElementById('lastMessageTime').value;

            if (!messages || messages <= 0) {
                alert('Debes ingresar la cantidad de mensajes acumulados');
                return;
            }

            const phone = phones[currentLiftingPhone];
            const liftedAt = new Date();
            const downSince = new Date(phone.downSince);
            const hoursDown = ((liftedAt - downSince) / (1000 * 60 * 60)).toFixed(1);

            phone.downtime.push({
                downSince: phone.downSince,
                liftedAt: liftedAt.toISOString(),
                hoursDown: parseFloat(hoursDown),
                accumulatedMessages: messages,
                firstMessageTime: firstMsg || null,
                lastMessageTime: lastMsg || null
            });

            phone.currentlyDown = false;
            phone.downSince = null;

            saveData();
            renderAll();
            closeLiftModal();
        }

        function deletePhone(phoneKey) {
            if (confirm(`¿Eliminar ${phones[phoneKey].name}?`)) {
                delete phones[phoneKey];
                saveData();
                renderAll();
            }
        }

        function renderAll() {
            renderSummary();
            renderDashboard();
            renderRanking();
        }

        function renderSummary() {
            let activeCount = 0;
            let downCount = 0;
            let watiketCount = 0;
            let soporteCount = 0;

            Object.values(phones).forEach(phone => {
                if (phone.type === 'soporte') {
                    soporteCount++;
                } else {
                    if (phone.currentlyDown) {
                        downCount++;
                    } else if (phone.metrics.length > 0) {
                        activeCount++;
                    }
                }
                
                if (phone.inWatiket) {
                    watiketCount++;
                }
            });

            document.getElementById('summaryActive').textContent = activeCount;
            document.getElementById('summaryDown').textContent = downCount;
            document.getElementById('summaryWatiket').textContent = watiketCount;
            document.getElementById('summarySoporte').textContent = soporteCount;
        }

        function renderDashboard() {
            const dashboard = document.getElementById('dashboard');

            if (Object.keys(phones).length === 0) {
                dashboard.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📱</div>
                        <h3>No hay celulares registrados</h3>
                        <p>Comienza agregando métricas</p>
                    </div>
                `;
                return;
            }

            dashboard.innerHTML = Object.entries(phones)
                .sort((a, b) => {
                    // Principales primero, luego soportes
                    if (a[1].type !== b[1].type) {
                        return a[1].type === 'principal' ? -1 : 1;
                    }
                    // Por vistas/hora descendente
                    const aViews = a[1].metrics.length > 0 ? a[1].metrics[a[1].metrics.length - 1].viewsPerHour : 0;
                    const bViews = b[1].metrics.length > 0 ? b[1].metrics[b[1].metrics.length - 1].viewsPerHour : 0;
                    return bViews - aViews;
                })
                .map(([key, phone]) => {
                const latest = phone.metrics[phone.metrics.length - 1] || {};
                const status = getPhoneStatus(phone);
                const viewsPerHour = latest.viewsPerHour || 0;
                const maxViewsPerHour = 200;
                const flowPercent = Math.min((viewsPerHour / maxViewsPerHour) * 100, 100);

                const totalDowntimes = phone.downtime.length;
                const avgMessages = totalDowntimes > 0 
                    ? Math.round(phone.downtime.reduce((sum, d) => sum + d.accumulatedMessages, 0) / totalDowntimes)
                    : 0;

                let downInfo = '';
                if (phone.currentlyDown) {
                    const downSince = new Date(phone.downSince);
                    const hoursDown = ((new Date() - downSince) / (1000 * 60 * 60)).toFixed(1);
                    downInfo = `
                        <div class="down-info">
                            <div class="down-info-title">⚠️ CELULAR CAÍDO</div>
                            <div class="down-stat">Caído hace ${hoursDown} horas</div>
                            <div class="down-stat">Desde: ${downSince.toLocaleString('es-AR', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'})}</div>
                        </div>
                    `;
                }

                return `
                    <div class="phone-card ${status}">
                        <div class="phone-header">
                            <div class="phone-info">
                                <div class="phone-name">${phone.name}</div>
                                <div class="phone-digits">${phone.digits}</div>
                            </div>
                            <div class="badges">
                                <div class="badge ${phone.type}">${phone.type === 'principal' ? '🎯 Principal' : '🛟 Soporte'}</div>
                                <div class="badge ${phone.inWatiket ? 'watiket' : 'no-watiket'}">
                                    ${phone.inWatiket ? '✓ Watiket' : '✗ Sin Watiket'}
                                </div>
                                <div class="status-badge ${status}">
                                    ${status === 'active' ? '🟢 Activo' : 
                                      status === 'moderate' ? '🟡 Leve' : 
                                      status === 'soporte-status' ? '⚪ Soporte' : '🔴 Inactivo'}
                                </div>
                            </div>
                        </div>

                        <div class="metrics-compact">
                            <div class="metric-compact">
                                <div class="metric-compact-label">Vistas/Hora</div>
                                <div class="metric-compact-value">${viewsPerHour}<span class="metric-unit">v/h</span></div>
                            </div>
                            <div class="metric-compact">
                                <div class="metric-compact-label">Vistas Actual</div>
                                <div class="metric-compact-value">${latest.views || 0}</div>
                            </div>
                            <div class="metric-compact">
                                <div class="metric-compact-label">Total Caídas</div>
                                <div class="metric-compact-value">${totalDowntimes}</div>
                            </div>
                            <div class="metric-compact">
                                <div class="metric-compact-label">Prom. Mensajes</div>
                                <div class="metric-compact-value">${avgMessages}<span class="metric-unit">msgs</span></div>
                            </div>
                        </div>

                        <div class="flow-bar">
                            <div class="flow-fill" style="width: ${flowPercent}%"></div>
                        </div>

                        ${downInfo}

                        <div class="actions">
                            ${!phone.currentlyDown ? 
                                `<button class="btn-small btn-down" onclick="markPhoneDown('${key}')">🔻 Marcar Caído</button>` :
                                `<button class="btn-small btn-up" onclick="openLiftModal('${key}')">🔺 Levantar</button>`
                            }
                            <button class="btn-small btn-delete" onclick="deletePhone('${key}')">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderRanking() {
            const rankingSection = document.getElementById('rankingSection');
            const rankingList = document.getElementById('rankingList');

            const principales = Object.entries(phones)
                .filter(([_, phone]) => phone.type === 'principal' && phone.metrics.length > 0)
                .map(([key, phone]) => ({
                    key,
                    name: phone.name,
                    digits: phone.digits,
                    inWatiket: phone.inWatiket,
                    viewsPerHour: phone.metrics[phone.metrics.length - 1].viewsPerHour
                }))
                .sort((a, b) => b.viewsPerHour - a.viewsPerHour);

            if (principales.length === 0) {
                rankingSection.style.display = 'none';
                return;
            }

            rankingSection.style.display = 'block';

            rankingList.innerHTML = principales.map((phone, index) => {
                let medalClass = '';
                if (index === 0) medalClass = 'gold';
                else if (index === 1) medalClass = 'silver';
                else if (index === 2) medalClass = 'bronze';

                return `
                    <div class="ranking-item">
                        <div class="rank-number ${medalClass}">
                            ${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}
                        </div>
                        <div class="rank-info">
                            <div class="rank-name">${phone.name} (${phone.digits})</div>
                            <div class="rank-stat">${phone.viewsPerHour} vistas/hora</div>
                            ${phone.inWatiket ? '<div class="rank-watiket">✓ En Watiket</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function exportData() {
            const dataStr = JSON.stringify(phones, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `metriwapp_${new Date().toISOString().split('T')[0]}.json`;
            link.click();
        }

        function clearAllData() {
            if (confirm('¿Estás seguro de borrar TODOS los datos? Esta acción no se puede deshacer.')) {
                phones = {};
                saveData();
                renderAll();
            }
        }

        // Cargar datos al iniciar
        loadData();

        // Auto-guardar cada 30 segundos
        setInterval(saveData, 30000);
    </script>
</body>
</html>
