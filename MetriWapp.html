<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetriWapp Intelligence | FINAL RECOVERY V11</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f5f9; --side: #0f172a; --accent: #2563eb; 
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; 
            --text: #1e293b; --muted: #64748b; --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- SIDEBAR OPERATIVO --- */
        .sidebar { width: 350px; background: var(--side); color: white; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; border-right: 1px solid #1e293b; }
        .logo { font-size: 24px; font-weight: 900; margin-bottom: 25px; border-bottom: 3px solid var(--accent); padding-bottom: 10px; }
        .logo span { color: var(--accent); }

        .f-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .f-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #94a3b8; margin-bottom: 5px; display: block; }
        .f-input { width: 100%; background: #1e293b; border: 1px solid #334155; color: white; padding: 10px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; font-family: inherit; }

        .btn-submit { background: var(--accent); color: white; border: none; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 #1d4ed8; transition: 0.1s; }
        .btn-submit:active { transform: translateY(3px); box-shadow: 0 1px 0 #1d4ed8; }

        /* --- CONTENIDO --- */
        .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #fff; padding: 0 30px; height: 70px; border-bottom: 2px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .clock { font-family: 'JetBrains Mono'; font-weight: 900; font-size: 20px; color: var(--side); }

        .container { flex: 1; padding: 25px; overflow-y: auto; }

        /* --- CARDS DE AUDITORÍA --- */
        .stats-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .stat-card small { font-size: 9px; font-weight: 900; color: var(--muted); text-transform: uppercase; }
        .stat-card div { font-size: 24px; font-weight: 900; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 15px; }
        .p-card { background: white; border: 2px solid #e2e8f0; border-radius: 16px; padding: 18px; position: relative; }
        .p-card.is-down { border-color: var(--danger); background: #fff8f8; }
        .p-card.is-warning { border-color: var(--warning); border-width: 3px; }

        .p-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .p-title h3 { font-size: 20px; font-weight: 900; line-height: 1.1; }
        .p-title code { font-family: 'JetBrains Mono'; color: var(--muted); font-weight: 700; font-size: 13px; background: #f1f5f9; padding: 2px 5px; border-radius: 4px; }

        /* --- TABLA DE CARGAS (BITACORA POR TARJETA) --- */
        .p-history { background: #f8fafc; border-radius: 10px; margin-top: 15px; border: 1px solid #e2e8f0; overflow: hidden; }
        .p-history-header { background: #f1f5f9; padding: 6px 12px; font-size: 10px; font-weight: 900; color: #475569; }
        .log-row { display: flex; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid #edf2f7; font-size: 12px; font-weight: 600; }
        .log-row:last-child { border-bottom: none; }
        .log-vph { color: var(--accent); font-weight: 800; }

        .gap-info { background: #0f172a; color: white; border-radius: 10px; padding: 12px; margin-top: 15px; }
        .gap-time { color: var(--warning); font-family: 'JetBrains Mono'; font-weight: 900; font-size: 16px; }

        .btn-footer { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-sub { padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-weight: 800; font-size: 12px; background: white; cursor: pointer; cursor: pointer; }
        .btn-sub:hover { background: #f1f5f9; }

        .tab-btn { padding: 10px 20px; font-weight: 800; border: none; background: transparent; cursor: pointer; color: var(--muted); border-radius: 8px; }
        .tab-btn.active { background: #e0f2fe; color: var(--accent); }
    </style>
</head>
<body>

    <!-- --- LADO IZQUIERDO: FORMULARIO --- -->
    <div class="sidebar">
        <div class="logo">Metri<span>Wapp V11</span></div>

        <div class="f-box">
            <label class="f-label">Identificación</label>
            <input type="text" id="fName" class="f-input" placeholder="Nombre (Ej: Princi 1)">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
                <div><label class="f-label">4 Dígitos</label><input type="text" id="fDigs" class="f-input" maxlength="4" placeholder="0000"></div>
                <div><label class="f-label">Tipo</label><select id="fType" class="f-input"><option value="Principal">Principal</option><option value="Soporte">Soporte</option></select></div>
            </div>
        </div>

        <div class="f-box">
            <label class="f-label">Estado de Vistas</label>
            <div style="display:grid; grid-template-columns:1fr 1.2fr; gap:10px">
                <input type="number" id="fViews" class="f-input" placeholder="Cantidad">
                <input type="time" id="fTime" class="f-input">
            </div>
        </div>

        <div class="f-box">
            <label class="f-label">Hora del Último Mensaje</label>
            <div style="display:grid; grid-template-columns:1fr 1.5fr; gap:10px">
                <select id="fMsgDay" class="f-input"><option value="Hoy">HOY</option><option value="Ayer">AYER</option></select>
                <input type="time" id="fMsgTime" class="f-input">
            </div>
            <label class="f-label">Flujo Operativo</label>
            <select id="fFlow" class="f-input"><option value="Alto">🔥 ALTO</option><option value="Medio" selected>Medio</option><option value="Bajo">Bajo</option></select>
        </div>

        <div class="f-input" style="background:#1e293b; padding:12px; border-radius:10px; display:flex; gap:10px; align-items:center;">
            <input type="checkbox" id="fWk" checked style="width:20px; height:20px; accent-color:var(--accent)">
            <label for="fWk" style="font-weight:900; cursor:pointer;">Operando en Watiket</label>
        </div>

        <button class="btn-submit" onclick="submitUpdate()">Subir Informe de Auditoría</button>

        <div style="margin-top:auto; padding-top:20px; display:flex; gap:10px;">
            <button class="btn-sub" onclick="exportJSON()" style="flex:1">Exportar</button>
            <button class="btn-sub" onclick="systemReset()" style="flex:1; border-color:var(--danger); color:var(--danger)">Reset</button>
        </div>
    </div>

    <!-- --- LADO DERECHO: MONITOR --- -->
    <div class="content">
        <div class="topbar">
            <div class="tabs">
                <button class="tab-btn active" id="tabLiveBtn" onclick="nav('mon')">Audit Live Monitor</button>
                <button class="tab-btn" onclick="nav('hist')">Bitácora Global</button>
            </div>
            <div class="clock" id="wallClock">00:00:00</div>
        </div>

        <div class="container" id="viewMon">
            <div class="stats-summary">
                <div class="stat-card" style="border-bottom: 4px solid var(--success);"><small>Activos</small><div id="stAct">0</div></div>
                <div class="stat-card" style="border-bottom: 4px solid var(--danger);"><small>Caídos</small><div id="stDown">0</div></div>
                <div class="stat-card" style="border-bottom: 4px solid #8b5cf6;"><small>En Watiket</small><div id="stWk">0</div></div>
                <div class="stat-card" style="border-bottom: 4px solid var(--accent);"><small>Carga Total (Vistas)</small><div id="stV">0</div></div>
            </div>

            <div class="grid" id="mainGrid"></div>
        </div>

        <div class="container" id="viewHist" style="display:none">
            <h2 style="margin-bottom:20px">📜 Reporte Histórico de Cargas</h2>
            <div style="background:white; border-radius:15px; border:2px solid #e2e8f0; overflow:hidden">
                <table style="width:100%; border-collapse:collapse;" id="auditTable">
                    <thead style="background:#0f172a; color:white; font-size:12px">
                        <tr>
                            <th style="padding:15px; text-align:left;">H. Registro</th>
                            <th>Celular</th>
                            <th>Status Data</th>
                            <th>Mensaje Data</th>
                        </tr>
                    </thead>
                    <tbody id="auditBody" style="font-size:13px"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const KEY_MASTER = 'METRIWAPP_ULTRALORD_V11';
        let db = JSON.parse(localStorage.getItem(KEY_MASTER)) || {};
        let auditLogs = JSON.parse(localStorage.getItem('LOGS_V11')) || [];

        // --- MOTOR DE RECUPERACIÓN BRUTO ---
        function bruteRescue() {
            let foundCount = 0;
            // Busca en todos los rincones del localStorage del navegador
            for(let i=0; i < localStorage.length; i++) {
                let key = localStorage.key(i);
                try {
                    let rawData = JSON.parse(localStorage.getItem(key));
                    // Si el objeto tiene datos de celular, lo absorbemos
                    if(typeof rawData === 'object') {
                        let values = Array.isArray(rawData) ? rawData : Object.values(rawData);
                        values.forEach(p => {
                            if(p.digits || p.name) {
                                const id = p.digits || 'p' + Math.random();
                                if(!db[id]) { db[id] = p; foundCount++; }
                            }
                        });
                    }
                } catch(e) {}
            }
            if(foundCount > 0) {
                console.log(`Rescue Engine: ${foundCount} dispositivos rescatados.`);
                saveAll();
            }
        }
        bruteRescue();

        function saveAll() {
            localStorage.setItem(KEY_MASTER, JSON.stringify(db));
            localStorage.setItem('LOGS_V11', JSON.stringify(auditLogs));
            render();
        }

        setInterval(() => {
            document.getElementById('wallClock').textContent = new Date().toLocaleTimeString('es-AR');
        }, 1000);

        function nav(v) {
            document.getElementById('viewMon').style.display = (v === 'mon' ? 'block' : 'none');
            document.getElementById('viewHist').style.display = (v === 'hist' ? 'block' : 'none');
            document.getElementById('tabLiveBtn').classList.toggle('active', v === 'mon');
        }

        function calculateVPH(v, timeInput) {
            if(!timeInput) return 0;
            const [h, m] = timeInput.split(':').map(Number);
            const now = new Date();
            const upload = new Date(); upload.setHours(h,m,0,0);
            if (upload > now) upload.setDate(upload.getDate() - 1);
            const diffHours = (now - upload) / (1000 * 60 * 60);
            return diffHours < 0.25 ? v : Math.round(v / diffHours);
        }

        function formatGap(mins) {
            if (mins < 60) return mins + " m";
            let h = Math.floor(mins / 60);
            let m = mins % 60;
            return h + "h " + m + "m";
        }

        function submitUpdate() {
            const name = document.getElementById('fName').value.trim();
            const dig = document.getElementById('fDigs').value.trim();
            const v = parseInt(document.getElementById('fViews').value);
            const statusTime = document.getElementById('fTime').value;
            const mTime = document.getElementById('fMsgTime').value;
            const mDay = document.getElementById('fMsgDay').value;

            if(!name || !dig || isNaN(v) || !statusTime || !mTime) return alert("Reporte imcompleto. Todos los datos son necesarios.");

            const vph = calculateVPH(v, statusTime);

            if(!db[dig]) db[dig] = { id: dig, name, digits: dig, trend: [], logs: [], isDown: false };
            
            // Historial por dispositivo (Bitacora interna)
            db[dig].trend.unshift({ v, vph, t: statusTime, recorded: new Date().toLocaleTimeString() });
            if(db[dig].trend.length > 5) db[dig].trend.pop();

            // Actualización dispositivo
            db[dig] = {
                ...db[dig],
                name, type: document.getElementById('fType').value,
                curV: v, curVPH: vph, curTime: statusTime,
                lastMsg: mTime, lastDay: mDay,
                flow: document.getElementById('fFlow').value,
                wk: document.getElementById('fWk').checked,
                lastSync: new Date().toISOString(),
                isDown: false
            };

            // Auditoria global
            auditLogs.unshift({
                sys: new Date().toLocaleTimeString(),
                name, dig, v, vph, statusT: statusTime, msgT: `${mTime} (${mDay})`
            });
            if(auditLogs.length > 100) auditLogs.pop();

            // Limpieza y guardado
            document.getElementById('fViews').value = "";
            document.getElementById('fTime').value = "";
            saveAll();
        }

        function render() {
            const grid = document.getElementById('mainGrid');
            const table = document.getElementById('auditBody');
            grid.innerHTML = ""; table.innerHTML = "";

            let stats = { act:0, down:0, wk:0, v:0 };
            const now = new Date();

            Object.values(db).forEach(p => {
                if(p.isDown) stats.down++; else { stats.act++; stats.v += p.curV; }
                if(p.wk) stats.wk++;

                // Lógica SILENCIO
                const [mh, mm] = (p.lastMsg || '00:00').split(':').map(Number);
                let msgDate = new Date();
                msgDate.setHours(mh, mm, 0, 0);
                if(p.lastDay === 'Ayer') msgDate.setDate(msgDate.getDate() - 1);
                const gap = Math.round((now - msgDate) / (1000 * 60));
                const alertSilent = (gap > 45 && !p.isDown);

                let trendsHtml = "";
                (p.trend || []).forEach(tr => {
                    trendsHtml += `<div class="log-row"><span>Status: <b>${tr.t}</b></span> <span>Vistas: ${tr.v} (<span class="log-vph">${tr.vph} vph</span>)</span></div>`;
                });

                grid.innerHTML += `
                    <div class="p-card ${alertSilent ? 'is-warning' : ''} ${p.isDown ? 'is-down' : ''}">
                        <div class="p-header">
                            <div class="p-name">
                                <h3>${p.name}</h3>
                                <code>${p.digits}</code>
                            </div>
                            <span style="font-size:10px; font-weight:800; padding:4px 8px; background:#f1f5f9; border-radius:5px">${p.type.toUpperCase()}</span>
                        </div>

                        <div style="font-size:11px; font-weight:700; color:var(--text); margin-bottom:8px;">
                            ${p.wk ? '<b style="color:#8b5cf6">✓ EN WATIKET</b>' : '<b style="color:var(--muted)">NO WATIKET</b>'}
                            | FLOW: <b>${p.flow}</b>
                        </div>

                        <div class="gap-info">
                            LLEGÓ EL ÚLTIMO MENSAJE: <b>${p.lastMsg} (${p.lastDay})</b>
                            <div style="margin-top:5px">INACTIVO HACE: <span class="gap-time">${p.isDown ? '--' : formatGap(gap)}</span></div>
                            ${alertSilent ? `<div style="color:var(--danger); font-size:10px; font-weight:900; margin-top:5px; text-transform:uppercase">⚠️ CELULAR EN SILENCIO CRÍTICO</div>` : ''}
                        </div>

                        <div class="p-history">
                            <div class="p-history-header">ÚLTIMAS MÉTRICAS DE CARGA</div>
                            ${trendsHtml}
                        </div>

                        <div class="btn-footer">
                            <button class="btn-sub" onclick="setD('${p.digits}')" style="background:${p.isDown ? 'var(--success)' : '#fff'}; color:${p.isDown ? '#fff' : 'var(--danger)'}">
                                ${p.isDown ? 'RECUPERADO ↑' : 'CAÍDO ↓'}
                            </button>
                            <button class="btn-sub" onclick="removeP('${p.digits}')">Borrar</button>
                        </div>
                    </div>
                `;
            });

            auditLogs.forEach(l => {
                table.innerHTML += `<tr><td style="padding:10px">${l.sys}</td><td><b>${l.name}</b></td><td>${l.v} views @ ${l.statusT}</td><td>Ult: ${l.msgT}</td></tr>`;
            });

            document.getElementById('stAct').textContent = stats.act;
            document.getElementById('stDown').textContent = stats.down;
            document.getElementById('stWk').textContent = stats.wk;
            document.getElementById('stV').textContent = stats.v;
        }

        function setD(id) {
            if(!db[id].isDown) { db[id].isDown = true; saveAll(); }
            else {
                let msgs = prompt("Cantidad de mensajes acumulados durante la caída:");
                if(msgs) {
                    db[id].isDown = false;
                    saveAll();
                }
            }
        }

        function removeP(id) { if(confirm("¿Eliminar?")) { delete db[id]; saveAll(); } }
        function systemReset() { if(confirm("¿RESET TOTAL? Borrarás incluso la bitácora histórica.")) { db={}; auditLogs=[]; saveAll(); } }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify({phones:db, audit:auditLogs}, null, 2));
            const dl = document.createElement('a'); dl.setAttribute("href", dataStr);
            dl.setAttribute("download", `Reporte_Auditoria_${new Date().toLocaleDateString()}.json`); dl.click();
        }

        saveAll();
    </script>
</body>
</html>
